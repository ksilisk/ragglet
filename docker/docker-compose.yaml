# docker/compose.yaml
services:
  ragglet:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: ragglet
    environment:
      - RAGGLET_ENV=dev
    volumes:
      - ../configs:/app/configs:ro
      - ../data:/app/data
      - ../results:/app/results
    depends_on:
      - redis
    # по умолчанию контейнер ничего не делает, ты запускаешь команды через `docker compose run`
    profiles: ["app"]

  redis:
    image: redis:7-alpine
    container_name: ragglet-redis
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    profiles: ["qdrant", "milvus", "weaviate", "pgvector", "app"]

  # ---- Qdrant ----
  qdrant:
    image: qdrant/qdrant:v1.17.0
    container_name: ragglet-qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    profiles: ["qdrant"]

  # ---- Postgres + pgvector ----
  pgvector:
    image: pgvector/pgvector:pg16
    container_name: ragglet-pgvector
    environment:
      POSTGRES_USER: ragglet
      POSTGRES_PASSWORD: ragglet
      POSTGRES_DB: ragglet
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    profiles: ["pgvector"]

  # ---- Milvus (если решишь) ----
  # milvus:
  #   image: milvusdb/milvus:v2.4.4
  #   ...
  #   profiles: ["milvus"]

volumes:
  redis_data:
  qdrant_data:
  pg_data: