version: 1
name: baseline_qdrant_fanout_two_vec
description: Single-source vector retrieval (Qdrant), no rerank, no cache, no generation
tags: []
seed: 42
timeouts:
  total_ms: 6000
  retrieval_ms: 1500
  rerank_ms: 800
  llm_ms: 3500
run:
  repeats: 2
  shuffle: false
  save_per_query: true
  artifacts_dir: results/runs
output:
  format: csv
  include_debug_fields: false
dataset:
  id: data/queries/baseline_qdrant.jsonl
  limit: 2000
  query_field: question
  truth_field: relevant
storage:
  mode: single
  backend:
    type: qdrant
    endpoint: http://localhost:6333
    collection: chunks_v1
embedding:
  model: all-MiniLM-L6-v2
  normalize: true
retrieval:
  strategy: fanout_merge
  top_k: 30
  async: false
  sources:
    - name: vec_fast
      kind: vector
      weight: 1.0
      params:
        ef_search: 64
    - name: bm25
      kind: keyword
      weight: 1.0
      params:
        k1: 1.3
  merge:
    method: "weighted_sum"
    rrf_k: 60
    deduplicate: true
rerank:
  enabled: false
  model: null
  input_top_k: 30
  output_top_n: 10
context:
  max_tokens: 1200
  policy: top_n
  threshold: 0.0
  include_metadata: true
generation:
  enabled: false
  provider: openai_compatible
  model: null
  temperature: 0.2
  max_output_tokens: 300
cache:
  enabled: true
  embedding:
    type: "redis"
    endpoint: "redis://localhost:6379/0"
    ttl_seconds: 86400
  retrieval:
    type: "memory_lru"
    size: 10000
metrics:
  results_path: results/{name}_{timestamp}.parquet
  latency_steps:
  - embed
  - retrieve
  - total
  percentiles:
  - 50
  - 95
  - 99
  quality:
    recall_at_k:
    - 1
    - 3
    - 5
    - 10
    - 30
    mrr_at_k: 30
